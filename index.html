<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>尸潮炮线</title>
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="assets/item-icon-atlas-v1.png">
  <link rel="preload" as="image" href="assets/arena-bg-readable-v1.png">
  <link rel="preload" as="image" href="assets/premium-ui-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-boss-elite-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-ground-decal-atlas-v2.png">
  <link rel="preload" as="image" href="assets/premium-atmosphere-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-hero-fx-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-screen-strike-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-ultimate-cast-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-area-event-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-hit-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-threat-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-horde-atlas-v2.png">
  <link rel="preload" as="image" href="assets/premium-unit-aura-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-projectile-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-motion-trail-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-swarm-pressure-atlas-v1.png">
  <link rel="preload" as="image" href="assets/premium-hostile-projectile-atlas-v1.png">
  <link rel="stylesheet" href="styles.css?v=horde-cannon-v1">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud" class="hud hidden">
    <div class="hud-top">
      <div class="pill"><span id="timer">15:00</span></div>
      <div class="pill"><span id="hudLevelLabel">Lv</span> <span id="level">1</span></div>
      <div class="pill"><span id="hudStageLabel">波次</span> <span id="wave">1</span></div>
      <div class="pill"><span id="hudCoinsLabel">零件</span> <span id="runCoins">0</span></div>
      <button id="soundBtn" class="icon-btn" title="声音">♪</button>
      <button id="pauseBtn" class="icon-btn" title="暂停">II</button>
    </div>
    <div class="bars">
      <div class="bar hp"><div id="hpFill"></div><span id="hpText">100 / 100</span></div>
      <div class="bar xp"><div id="xpFill"></div><span id="xpText">0 / 10</span></div>
    </div>
    <div id="bossBar" class="boss-bar hidden">
      <div class="boss-head"><span id="bossName">尸潮母体</span><span id="bossText">100%</span></div>
      <div class="bar boss"><div id="bossFill"></div></div>
    </div>
    <div class="loadout">
      <div>
        <div id="weaponTitle" class="loadout-title">武器</div>
        <div id="weaponList" class="slots"></div>
      </div>
      <div>
        <div id="passiveTitle" class="loadout-title">模块</div>
        <div id="passiveList" class="slots"></div>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <section id="menuScreen" class="panel main-panel">
      <div class="brand">
        <div class="sigil"></div>
        <div>
          <h1 id="brandTitle">尸潮炮线</h1>
          <p id="brandSubtitle">自动开火，守住防线，熬到天亮。</p>
        </div>
      </div>
      <label class="language-row" for="languageSelect">
        <span id="languageLabel">语言</span>
        <select id="languageSelect" aria-label="语言">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <div class="menu-actions">
        <button id="startBtn" class="primary">开始防守</button>
        <button id="upgradeBtn">永久升级</button>
        <button id="achievementBtn">成就</button>
        <button id="codexBtn">图鉴</button>
        <button id="menuSoundBtn">声音：开</button>
      </div>
      <div class="save-row">
        <span><span id="totalCoinsLabel">总零件</span> <strong id="totalCoins">0</strong></span>
        <button id="resetBtn" class="subtle">重置存档</button>
      </div>
    </section>

    <section id="characterScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2 id="characterTitle">选择守卫</h2>
        <button id="backToMenuBtn" class="subtle">返回</button>
      </div>
      <div id="characterGrid" class="card-grid"></div>
    </section>

    <section id="upgradeScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2 id="upgradeTitle">永久升级</h2>
        <button id="backFromUpgradeBtn" class="subtle">返回</button>
      </div>
      <div class="screen-balance" id="upgradeBalance">
        <span id="upgradeCoinsLabel">总零件</span>
        <strong id="upgradeCoins">0</strong>
      </div>
      <div id="metaGrid" class="upgrade-grid"></div>
    </section>

    <section id="codexScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2 id="codexTitle">图鉴</h2>
        <button id="backFromCodexBtn" class="subtle">返回</button>
      </div>
      <div id="codexGrid" class="codex-grid"></div>
    </section>

    <section id="achievementScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2 id="achievementTitle">成就</h2>
        <button id="backFromAchievementBtn" class="subtle">返回</button>
      </div>
      <div id="achievementGrid" class="achievement-grid"></div>
    </section>

    <section id="levelScreen" class="panel wide-panel hidden">
      <h2 id="levelTitle">补给投放</h2>
      <p id="levelSubtitle" class="muted">选择一项强化。</p>
      <div id="choiceGrid" class="choice-grid"></div>
    </section>

    <section id="chestScreen" class="panel main-panel hidden">
      <h2 id="chestTitle">精英补给箱</h2>
      <div id="chestReward" class="reward-card"></div>
      <button id="chestContinueBtn" class="primary">继续</button>
    </section>

    <section id="pauseScreen" class="panel main-panel hidden">
      <h2 id="pauseTitle">暂停</h2>
      <div class="menu-actions">
        <button id="resumeBtn" class="primary">继续</button>
        <button id="quitBtn">结束本局</button>
      </div>
    </section>

    <section id="resultScreen" class="panel main-panel hidden">
      <h2 id="resultTitle">结算</h2>
      <div id="resultStats" class="result-stats"></div>
      <div class="menu-actions">
        <button id="retryBtn" class="primary">再来一局</button>
        <button id="menuBtn">回到主菜单</button>
      </div>
    </section>
  </div>

  <div id="touchPad" class="touch-pad hidden">
    <div id="touchStick"></div>
  </div>

  <script>
    try { localStorage.setItem("spirit-survivors-language-v1", "zh"); } catch (_) {}
  </script>
  <script src="game.js?v=horde-cannon-v1"></script>
  <script src="horde-theme.js?v=horde-cannon-v2"></script>
</body>
</html>
