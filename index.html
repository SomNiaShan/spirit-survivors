<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>灵潮幸存者</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud" class="hud hidden">
    <div class="hud-top">
      <div class="pill"><span id="timer">15:00</span></div>
      <div class="pill">Lv <span id="level">1</span></div>
      <div class="pill">妖潮 <span id="wave">1</span></div>
      <div class="pill">灵石 <span id="runCoins">0</span></div>
      <button id="soundBtn" class="icon-btn" title="声音">♪</button>
      <button id="pauseBtn" class="icon-btn" title="暂停">II</button>
    </div>
    <div class="bars">
      <div class="bar hp"><div id="hpFill"></div><span id="hpText">100 / 100</span></div>
      <div class="bar xp"><div id="xpFill"></div><span id="xpText">0 / 10</span></div>
    </div>
    <div id="bossBar" class="boss-bar hidden">
      <div class="boss-head"><span id="bossName">灵潮妖君</span><span id="bossText">100%</span></div>
      <div class="bar boss"><div id="bossFill"></div></div>
    </div>
    <div class="loadout">
      <div>
        <div class="loadout-title">法宝</div>
        <div id="weaponList" class="slots"></div>
      </div>
      <div>
        <div class="loadout-title">心法</div>
        <div id="passiveList" class="slots"></div>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <section id="menuScreen" class="panel main-panel">
      <div class="brand">
        <div class="sigil"></div>
        <div>
          <h1>灵潮幸存者</h1>
          <p>自动施法，万妖围城，活到天明。</p>
        </div>
      </div>
      <div class="menu-actions">
        <button id="startBtn" class="primary">开始修行</button>
        <button id="upgradeBtn">永久升级</button>
        <button id="achievementBtn">成就</button>
        <button id="codexBtn">图鉴</button>
        <button id="menuSoundBtn">声音：开</button>
      </div>
      <div class="save-row">
        <span>总灵石 <strong id="totalCoins">0</strong></span>
        <button id="resetBtn" class="subtle">重置存档</button>
      </div>
    </section>

    <section id="characterScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2>选择角色</h2>
        <button id="backToMenuBtn" class="subtle">返回</button>
      </div>
      <div id="characterGrid" class="card-grid"></div>
    </section>

    <section id="upgradeScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2>永久升级</h2>
        <button id="backFromUpgradeBtn" class="subtle">返回</button>
      </div>
      <div id="metaGrid" class="upgrade-grid"></div>
    </section>

    <section id="codexScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2>图鉴</h2>
        <button id="backFromCodexBtn" class="subtle">返回</button>
      </div>
      <div id="codexGrid" class="codex-grid"></div>
    </section>

    <section id="achievementScreen" class="panel wide-panel hidden">
      <div class="screen-head">
        <h2>成就</h2>
        <button id="backFromAchievementBtn" class="subtle">返回</button>
      </div>
      <div id="achievementGrid" class="achievement-grid"></div>
    </section>

    <section id="levelScreen" class="panel wide-panel hidden">
      <h2>灵气涌动</h2>
      <p class="muted">选择一项强化。</p>
      <div id="choiceGrid" class="choice-grid"></div>
    </section>

    <section id="chestScreen" class="panel main-panel hidden">
      <h2>妖丹宝箱</h2>
      <div id="chestReward" class="reward-card"></div>
      <button id="chestContinueBtn" class="primary">继续</button>
    </section>

    <section id="pauseScreen" class="panel main-panel hidden">
      <h2>暂停</h2>
      <div class="menu-actions">
        <button id="resumeBtn" class="primary">继续</button>
        <button id="quitBtn">结束本局</button>
      </div>
    </section>

    <section id="resultScreen" class="panel main-panel hidden">
      <h2 id="resultTitle">结算</h2>
      <div id="resultStats" class="result-stats"></div>
      <div class="menu-actions">
        <button id="retryBtn" class="primary">再来一局</button>
        <button id="menuBtn">回到主菜单</button>
      </div>
    </section>
  </div>

  <div id="touchPad" class="touch-pad hidden">
    <div id="touchStick"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
